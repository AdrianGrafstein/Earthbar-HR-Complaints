<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earthbar · HR Case Management</title>
<style>
  :root{
    --ink:#111111; --bg:#ffffff; --muted:#6b6b6b; --line:#e5e5e5;
    --wash:#f6f6f6; --wash2:#efefef;
    --green-dk:#111111; --grey:#6b6b6b; --red:#111111;
    --radius:2px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;color:var(--ink);
    background:var(--bg);line-height:1.5;font-size:15px;-webkit-font-smoothing:antialiased}

  header.top{background:#fff;color:var(--ink);padding:16px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--ink)}
  header.top .brand{font-size:20px;font-weight:700;letter-spacing:-.02em;text-transform:lowercase}
  header.top .rule{width:1px;height:20px;background:var(--line)}
  header.top .sub{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}

  nav{background:#fff;border-bottom:1px solid var(--line);padding:0 16px;display:flex;gap:6px;overflow-x:auto}
  nav button{border:none;background:none;padding:14px 14px;font-size:12px;font-weight:600;letter-spacing:.1em;
    text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
  nav button.active{color:var(--ink);border-bottom-color:var(--ink)}
  nav button:hover{color:var(--ink)}

  main{max-width:1040px;margin:0 auto;padding:28px 16px 64px}

  .card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:24px;margin-bottom:18px}
  h2.section{font-size:20px;margin:2px 0 4px;font-weight:600;letter-spacing:-.01em}
  .muted{color:var(--muted);font-size:14px}
  .row{display:flex;gap:18px;flex-wrap:wrap}
  .col{flex:1;min-width:240px}

  label{display:block;font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin:16px 0 6px}
  input[type=text],input[type=date],textarea,select{width:100%;padding:10px 12px;border:1px solid #d2d2d2;
    border-radius:var(--radius);font-size:14px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--ink)}
  textarea{min-height:120px;resize:vertical}

  .radio-cards{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px}
  .radio-card{flex:1;min-width:220px;border:1px solid var(--line);border-radius:var(--radius);padding:16px;cursor:pointer;transition:.12s;background:#fff}
  .radio-card.sel{border-color:var(--ink);background:var(--wash)}
  .radio-card b{display:block;margin-bottom:3px}
  .radio-card .muted{font-size:12.5px}

  .btn{background:var(--ink);color:#fff;border:1px solid var(--ink);padding:11px 20px;border-radius:var(--radius);
    font-size:13px;font-weight:600;letter-spacing:.02em;cursor:pointer}
  .btn:hover{background:#000}
  .btn:disabled{opacity:.45;cursor:default}
  .btn.sec{background:#fff;color:var(--ink);border:1px solid var(--ink)}
  .btn.sec:hover{background:var(--wash)}
  .btn.ghost{background:#fff;color:var(--muted);border:1px solid var(--line)}
  .btn.sm{padding:7px 12px;font-size:12px}
  .btn.ms{background:var(--ink);display:inline-flex;align-items:center;gap:10px}
  .btn.ms:hover{background:#000}

  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:var(--radius);font-size:10.5px;
    font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--ink);background:#fff;color:var(--ink)}
  .pill.dot::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
  .s-Resolved,.s-Closed{background:var(--ink);color:#fff}
  .s-Submitted,.s-Triage,.s-Assigned,.s-UnderReview,.s-Action,.s-OnHold{background:#fff;color:var(--ink)}
  .s-Escalated{background:#fff;color:var(--ink);border-width:1.5px}

  table{width:100%;border-collapse:collapse;font-size:14px}
  th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:10px;border-bottom:1px solid var(--line)}
  td{padding:12px 10px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
  tr.clk{cursor:pointer}
  tr.clk:hover td{background:var(--wash)}
  .ref{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;font-weight:700;color:var(--ink)}

  .banner{border-radius:var(--radius);padding:13px 16px;margin:8px 0;font-size:14px;background:var(--wash);border:1px solid var(--line);border-left:3px solid var(--ink)}
  .banner.ok,.banner.info,.banner.warn,.banner.err{background:var(--wash);border-left:3px solid var(--ink)}
  .banner.err{border:1px solid var(--ink)}

  .codebox{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:22px;font-weight:800;letter-spacing:3px;
    background:#fff;border:1.5px dashed var(--ink);border-radius:var(--radius);padding:14px;text-align:center;color:var(--ink)}

  .timeline{list-style:none;margin:0;padding:0}
  .timeline li{position:relative;padding:0 0 16px 22px;border-left:1px solid var(--line);margin-left:6px}
  .timeline li:last-child{border-left-color:transparent}
  .timeline li::before{content:"";position:absolute;left:-5px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--ink)}
  .timeline .t{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .timeline .e{font-weight:500;font-size:14px}

  .kv{display:flex;gap:8px;font-size:14px;padding:5px 0}
  .kv .k{color:var(--muted);width:120px;flex-shrink:0;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding-top:2px}

  .task{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);margin-bottom:8px;font-size:14px}
  .task .due{margin-left:auto;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase}

  .divider{height:1px;background:var(--line);margin:20px 0}
  .back{background:none;border:none;color:var(--ink);font-weight:600;cursor:pointer;padding:0;margin-bottom:12px;font-size:13px;text-transform:uppercase;letter-spacing:.08em}

  .stat{flex:1;min-width:150px;background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .stat .n{font-size:28px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
  .stat .l{font-size:10.5px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

  .msg{padding:10px 12px;border-radius:var(--radius);margin-bottom:8px;font-size:14px;max-width:78%}
  .msg.reporter{background:var(--wash);color:var(--ink);align-self:flex-start;border:1px solid var(--line)}
  .msg.handler{background:var(--ink);color:#fff;margin-left:auto}
  .msgwrap{display:flex;flex-direction:column;gap:2px}
  .msg .who{font-size:10.5px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px}
  .msg.handler .who{color:rgba(255,255,255,.65)}

  .chip{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:var(--radius);background:var(--wash2);color:var(--ink)}
  .note-sm{font-size:12.5px;color:var(--muted);margin-top:6px}
  .warnbadge{background:var(--ink);color:#fff;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 7px;border-radius:var(--radius)}

  .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  .subj-result{padding:9px 11px;border:1px solid var(--line);border-radius:var(--radius);margin-top:4px;cursor:pointer;font-size:13.5px}
  .subj-result:hover{background:var(--wash)}

  #userbox{margin-left:auto;display:flex;align-items:center;gap:12px}
  /* ---- v2 additions ---- */
  .pill.r-Low{background:#E7F6EC;color:#087443;border:1px solid #BFE3CC}
  .pill.r-Medium{background:#FDF3E0;color:#B7791F;border:1px solid #F0D9A8}
  .pill.r-High{background:#FEECEB;color:#B42318;border:1px solid #F3C4C0}
  .pill.due-ok{background:#E7F6EC;color:#087443}
  .pill.due-over{background:#FDF3E0;color:#B7791F;font-weight:700}
  tr.overdue td{background:#FDFAF0}
  tr.clk.overdue:hover td{background:#FAF3DE}
  .dash-actions{display:flex;gap:8px;align-items:center;margin-top:16px}
  .rule{height:1px;background:var(--line);margin:18px 0 2px}
  .filters{margin-top:12px;padding:12px;border:1px solid var(--line);background:var(--wash)}
  .stat{padding:16px 18px}
  .stat .n{line-height:1.15}
  label{margin-top:18px}
  .note-sm{line-height:1.45}
  .filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:14px}
  .filters input[type=text]{flex:2;min-width:180px;width:auto}
  .filters select{flex:1;min-width:120px;width:auto}
  .radio-card.fork{padding:20px;font-size:15px}
  .radio-card.fork:hover{border-color:var(--ink);background:var(--wash)}
  .mini-l{display:block;font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  input[type=file]{font-size:13px}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:grid;place-items:center;z-index:50;padding:16px}
  .modal{background:#fff;border-radius:var(--radius);border:1px solid var(--ink);padding:24px;max-width:520px;width:100%}
</style>
</head>
<body>
<header class="top">
  <div class="brand">earthbar</div>
  <div class="rule"></div>
  <div class="sub">HR Case Management</div>
  <span id="userbox"></span>
</header>
<nav id="nav"></nav>
<main id="app"><div class="card"><span class="spin"></span> Loading…</div></main>

<script src="./config.js"></script>
<script type="module" src="./app.js"></script>
</body>
</html>
